<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URBAN SURFER | Mobile Ready</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Orbitron', sans-serif; user-select: none; touch-action: none; }
        #ui { position: absolute; inset: 0; pointer-events: none; color: white; text-shadow: 2px 2px 4px #000; }
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; 
                  align-items: center; background: rgba(0,0,0,0.7); pointer-events: auto; backdrop-filter: blur(5px); }
        .btn { padding: 15px 50px; font-size: 1.5rem; background: #ffcc00; color: #000; border: none; 
               cursor: pointer; font-family: 'Orbitron'; font-weight: 900; border-radius: 5px; text-transform: uppercase; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 1.2rem; }
        #powerup-bar { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 1.2rem; color: #fff; display: none; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; }
        #warning { position: absolute; top: 20%; width: 100%; text-align: center; color: #ff0055; display: none; font-size: 1.5rem; animation: blink 0.2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="menu" class="screen">
            <h1 style="font-size: 3rem; margin-bottom: 10px; color: #fff; text-align: center;">URBAN SURFER</h1>
            <p style="text-align: center; padding: 0 20px;">SWIPE or ARROWS to Move/Jump/Slide</p>
            <button class="btn" onclick="startGame()">START RUN</button>
        </div>

        <div id="hud" class="hidden">
            <div>COINS: <span id="c-count">0</span></div>
            <div>SCORE: <span id="s-val">0</span></div>
        </div>
        
        <div id="warning">COP ON YOUR TAIL!</div>
        <div id="powerup-bar">POWERUP ACTIVE</div>

        <div id="over" class="screen hidden">
            <h1 style="color: #ff0055; font-size: 3rem;">CAUGHT!</h1>
            <p>FINAL SCORE: <span id="f-score">0</span></p>
            <button class="btn" onclick="location.reload()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        const LANES = [-4, 0, 4];
        let lane = 1, active = false, score = 0, coins = 0, speed = 1.0;
        let stumbled = false, sTimer = 0, magnetTimer = 0, hoverTimer = 0;
        let isSliding = false, slideTimer = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x66B2FF); 
        scene.fog = new THREE.Fog(0x66B2FF, 30, 180);
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 7, 14); camera.lookAt(0, 2, -5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        function createIconTexture(emoji, bgColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor; ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6; ctx.stroke();
            ctx.font = '70px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, 64, 72);
            return new THREE.CanvasTexture(canvas);
        }

        const magnetTex = createIconTexture('🧲', '#ff00ff');
        const hoverTex = createIconTexture('🚀', '#00cccc');

        const player = new THREE.Group();
        const pMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.2 }); 
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), pMat);
        torso.position.y = 1.6;
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), pMat);
        head.position.y = 2.5;
        const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), pMat);
        lLeg.position.set(-0.25, 0.8, 0);
        const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1, 0.25), pMat);
        rLeg.position.set(0.25, 0.8, 0);
        player.add(torso, head, lLeg, rLeg);
        scene.add(player);

        const cop = new THREE.Group();
        const cBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 0.8), new THREE.MeshStandardMaterial({color: 0x111144}));
        cBody.position.y = 1.5;
        cop.add(cBody);
        cop.position.set(0, 0, 25);
        scene.add(cop);

        const track = new THREE.Mesh(new THREE.PlaneGeometry(14, 2000), new THREE.MeshStandardMaterial({color: 0x333333}));
        track.rotation.x = -Math.PI/2; scene.add(track);

        const trains = [], barriers = [], coinsArr = [], powerups = [];
        const trainGeo = new THREE.BoxGeometry(3.5, 3.5, 12);
        const trainMat = new THREE.MeshStandardMaterial({color: 0x999999});
        
        for(let i=0; i<4; i++) { 
            let t = new THREE.Mesh(trainGeo, trainMat);
            t.position.set(LANES[Math.floor(Math.random()*3)], 1.75, -80 - (i * 60));
            scene.add(t); trains.push(t);
        }

        for(let i=0; i<15; i++) { 
            let c = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.1, 8, 16), new THREE.MeshStandardMaterial({color: 0xffd700}));
            c.position.set(LANES[Math.floor(Math.random()*3)], 1, -20 - (i*15));
            scene.add(c); coinsArr.push(c);
        }

        for(let i=0; i<2; i++) {
            let type = i; 
            let pMat = new THREE.SpriteMaterial({ map: type === 0 ? magnetTex : hoverTex });
            let p = new THREE.Sprite(pMat); p.scale.set(2, 2, 1);
            p.position.set(LANES[Math.floor(Math.random()*3)], 1.5, -100 - (i*150));
            p.pType = type; scene.add(p); powerups.push(p);
        }

        /** INPUTS (KEYBOARD + TOUCH SWIPE) **/
        let vVel = 0;
        let touchStartX = 0, touchStartY = 0;

        window.addEventListener('keydown', e => {
            if(!active) return;
            if(e.key === "ArrowLeft") moveLeft();
            if(e.key === "ArrowRight") moveRight();
            if(e.key === "ArrowUp") jump();
            if(e.key === "ArrowDown") slide();
        });

        window.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', e => {
            if(!active) return;
            let dx = e.changedTouches[0].clientX - touchStartX;
            let dy = e.changedTouches[0].clientY - touchStartY;
            if(Math.abs(dx) > Math.abs(dy)) {
                if(dx > 30) moveRight(); else if(dx < -30) moveLeft();
            } else {
                if(dy < -30) jump(); else if(dy > 30) slide();
            }
        });

        function moveLeft() { lane = Math.max(0, lane-1); }
        function moveRight() { lane = Math.min(2, lane+1); }
        function jump() { if(player.position.y <= (hoverTimer > 0 ? 5.1 : 0.1) && !isSliding) vVel = 0.4; }
        function slide() { if(player.position.y < 0.2) { isSliding = true; slideTimer = 30; } }

        function update() {
            if(!active) return;
            speed += 0.0001; score++;
            let d = Date.now();
            
            if(isSliding) {
                slideTimer--;
                torso.rotation.x = Math.PI / 2; torso.position.y = 0.5;
                if(slideTimer <= 0) isSliding = false;
            } else {
                torso.rotation.x = 0.1; torso.position.y = 1.6;
                lLeg.rotation.x = Math.sin(d * 0.015) * 0.8;
                rLeg.rotation.x = -Math.sin(d * 0.015) * 0.8;
            }
            
            player.position.x = THREE.MathUtils.lerp(player.position.x, LANES[lane], 0.2);
            player.position.y += vVel;
            let floorLevel = hoverTimer > 0 ? 5 : 0; 
            if(player.position.y > floorLevel) vVel -= 0.022; 
            else { player.position.y = floorLevel; vVel = 0; }

            if(magnetTimer > 0) magnetTimer -= 0.016;
            if(hoverTimer > 0) { hoverTimer -= 0.016; camera.position.y = THREE.MathUtils.lerp(camera.position.y, 12, 0.1); } 
            else camera.position.y = THREE.MathUtils.lerp(camera.position.y, 7, 0.1);

            let targetZ = stumbled ? 4 : 20;
            cop.position.z = THREE.MathUtils.lerp(cop.position.z, targetZ, 0.05);
            cop.position.x = player.position.x;

            trains.forEach(t => {
                t.position.z += speed;
                if(t.position.z > 20) { t.position.z = -200 - Math.random()*100; t.position.x = LANES[Math.floor(Math.random()*3)]; }
                if(Math.abs(t.position.z - player.position.z) < 6 && Math.abs(t.position.x - player.position.x) < 1.5 && player.position.y < 3) endGame();
            });

            coinsArr.forEach(c => {
                c.position.z += speed;
                if(magnetTimer > 0 && c.position.z > player.position.z - 5 && c.position.z < player.position.z + 30) {
                    c.position.x = THREE.MathUtils.lerp(c.position.x, player.position.x, 0.1);
                    c.position.y = THREE.MathUtils.lerp(c.position.y, player.position.y + 1, 0.1);
                }
                if(c.position.z > 20) { c.position.z = -50 - Math.random()*50; c.position.x = LANES[Math.floor(Math.random()*3)]; }
                if(Math.abs(c.position.z - player.position.z) < 1.5 && Math.abs(c.position.x - player.position.x) < 1.5) {
                    coins++; c.position.z = -100; document.getElementById('c-count').innerText = coins;
                }
            });

            powerups.forEach(p => {
                p.position.z += speed;
                if(p.position.z > 20) { p.position.z = -300 - Math.random()*200; p.position.x = LANES[Math.floor(Math.random()*3)]; }
                if(Math.abs(p.position.z - player.position.z) < 1.5 && Math.abs(p.position.x - player.position.x) < 1.5) {
                    if(p.pType === 0) magnetTimer = 8; else { hoverTimer = 8; vVel = 0.5; }
                    p.position.z = -300;
                }
            });

            document.getElementById('s-val').innerText = score;
        }

        function startGame() { active = true; document.getElementById('menu').classList.add('hidden'); document.getElementById('hud').classList.remove('hidden'); }
        function endGame() { active = false; document.getElementById('over').classList.remove('hidden'); document.getElementById('f-score').innerText = score; }
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URBAN SURFER</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏄‍♂️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; user-select: none; touch-action: none; }
        #ui { position: absolute; inset: 0; pointer-events: none; color: white; text-shadow: 2px 2px 4px #000; }
        .screen { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; 
                  align-items: center; background: rgba(0,0,0,0.8); pointer-events: auto; backdrop-filter: blur(8px); }
        .btn { padding: 15px 50px; font-size: 1.5rem; background: #ffcc00; color: #000; border: none; 
               cursor: pointer; font-family: 'Orbitron'; font-weight: 900; border-radius: 5px; text-transform: uppercase; }
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; font-size: 1.2rem; }
        #powerup-bar { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); font-size: 1.2rem; color: #00ffff; display: none; background: rgba(0,0,0,0.6); padding: 10px 20px; border: 1px solid #00ffff; border-radius: 30px; }
        #warning { position: absolute; top: 25%; width: 100%; text-align: center; color: #ff0055; display: none; font-size: 1.8rem; animation: blink 0.2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="menu" class="screen">
            <h1 style="font-size: 3.5rem; margin-bottom: 10px; color: #00ffff;">URBAN SURFER</h1>
            <p style="margin-bottom: 20px;">SWIPE to Move | JUMP | SLIDE</p>
            <button class="btn" onclick="startGame()">START RUN</button>
        </div>

        <div id="hud" class="hidden">
            <div>COINS: <span id="c-count">0</span></div>
            <div>SCORE: <span id="s-val">0</span></div>
        </div>
        
        <div id="warning">COP ON YOUR TAIL!</div>
        <div id="powerup-bar">POWERUP ACTIVE</div>

        <div id="over" class="screen hidden">
            <h1 style="color: #ff0055; font-size: 3.5rem;">CAUGHT!</h1>
            <p>SCORE: <span id="f-score">0</span></p>
            <button class="btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <script>
        /** CONFIG **/
        const LANES = [-4, 0, 4];
        let lane = 1, active = false, score = 0, coins = 0, speed = 0.8;
        let stumbled = false, sTimer = 0, magnetTimer = 0, hoverTimer = 0;
        let isSliding = false, slideTimer = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505); 
        scene.fog = new THREE.Fog(0x050505, 20, 150);
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 7, 14); camera.lookAt(0, 2, -5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(10, 20, 10);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0x404040, 1.5));

        /** GENERATORS **/
        function createIconTexture(emoji, bgColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColor; ctx.beginPath(); ctx.arc(64, 64, 60, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 6; ctx.stroke();
            ctx.font = '70px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(emoji, 64, 72);
            return new THREE.CanvasTexture(canvas);
        }
        const magnetTex = createIconTexture('🧲', '#ff00ff');
        const hoverTex = createIconTexture('🚀', '#00cccc');

        /** PLAYER MODEL **/
        const player = new THREE.Group();
        const pMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 }); 
        const glowMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1 });
        
        const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), pMat); torso.position.y = 1.6;
        const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.45), pMat); head.position.y = 2.5;
        const visor = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.12, 0.46), glowMat); visor.position.set(0, 2.5, 0.05);
        const lLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), pMat); lLeg.position.set(-0.25, 0.8, 0);
        const rLeg = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1, 0.3), pMat); rLeg.position.set(0.25, 0.8, 0);
        player.add(torso, head, visor, lLeg, rLeg);
        scene.add(player);

        /** COP MODEL **/
        const cop = new THREE.Group();
        const cBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 0.8), new THREE.MeshStandardMaterial({color: 0x000044}));
        cBody.position.y = 1.5;
        const cSiren = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.2), new THREE.MeshBasicMaterial({color: 0xff0000}));
        cSiren.position.y = 2.7;
        cop.add(cBody, cSiren);
        cop.position.set(0, 0, 25);
        scene.add(cop);

        /** ENVIRONMENT **/
        const track = new THREE.Mesh(new THREE.PlaneGeometry(14, 2000), new THREE.MeshStandardMaterial({color: 0x222222}));
        track.rotation.x = -Math.PI/2; scene.add(track);

        const trains = [], barriers = [], coinsArr = [], powerups = [];
        const trainGeo = new THREE.BoxGeometry(3.5, 3.5, 12);
        const trainMat = new THREE.MeshStandardMaterial({color: 0x444444});

        for(let i=0; i<4; i++) { 
            let t = new THREE.Mesh(trainGeo, trainMat);
            t.position.set(LANES[Math.floor(Math.random()*3)], 1.75, -80 - (i * 60));
            scene.add(t); trains.push(t);
        }

        for(let i=0; i<15; i++) { 
            let c = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.12, 8, 16), new THREE.MeshStandardMaterial({color: 0xffd700, emissive: 0xaa8800}));
            c.position.set(LANES[Math.floor(Math.random()*3)], 1.2, -20 - (i*15));
            scene.add(c); coinsArr.push(c);
        }

        for(let i=0; i<2; i++) {
            let pMat = new THREE.SpriteMaterial({ map: i === 0 ? magnetTex : hoverTex });
            let p = new THREE.Sprite(pMat); p.scale.set(2, 2, 1);
            p.position.set(LANES[Math.floor(Math.random()*3)], 2, -150 - (i*200));
            p.pType = i; scene.add(p); powerups.push(p);
        }

        /** INPUTS **/
        let vVel = 0, touchStartX = 0, touchStartY = 0;
        window.addEventListener('keydown', e => {
            if(!active) return;
            if(e.key === "ArrowLeft") moveLeft(); if(e.key === "ArrowRight") moveRight();
            if(e.key === "ArrowUp") jump(); if(e.key === "ArrowDown") slide();
        });
        window.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        window.addEventListener('touchend', e => {
            if(!active) return;
            let dx = e.changedTouches[0].clientX - touchStartX; let dy = e.changedTouches[0].clientY - touchStartY;
            if(Math.abs(dx) > Math.abs(dy)) { if(dx > 30) moveRight(); else if(dx < -30) moveLeft(); }
            else { if(dy < -30) jump(); else if(dy > 30) slide(); }
        });

        function moveLeft() { lane = Math.max(0, lane-1); }
        function moveRight() { lane = Math.min(2, lane+1); }
        function jump() { if(player.position.y <= (hoverTimer > 0 ? 5.1 : 0.1) && !isSliding) vVel = 0.42; }
        function slide() { if(player.position.y < 0.2) { isSliding = true; slideTimer = 35; } }

        function update() {
            if(!active) return;
            speed += 0.0001; score++;
            let d = Date.now();
            
            if(isSliding) {
                slideTimer--; torso.rotation.x = Math.PI / 2.2; torso.position.y = 0.6; head.position.y = 1.0; visor.position.y = 1.0;
                if(slideTimer <= 0) isSliding = false;
            } else {
                torso.rotation.x = 0.1; torso.position.y = 1.6; head.position.y = 2.5; visor.position.y = 2.5;
                lLeg.rotation.x = Math.sin(d * 0.015) * 0.8; rLeg.rotation.x = -Math.sin(d * 0.015) * 0.8;
            }
            
            player.position.x = THREE.MathUtils.lerp(player.position.x, LANES[lane], 0.15);
            player.position.y += vVel;
            let floorLevel = hoverTimer > 0 ? 5 : 0; 
            if(player.position.y > floorLevel) vVel -= 0.022; else { player.position.y = floorLevel; vVel = 0; }

            if(magnetTimer > 0) magnetTimer -= 0.016;
            if(hoverTimer > 0) { hoverTimer -= 0.016; camera.position.y = THREE.MathUtils.lerp(camera.position.y, 12, 0.05); } 
            else camera.position.y = THREE.MathUtils.lerp(camera.position.y, 7, 0.05);

            document.getElementById('powerup-bar').style.display = (magnetTimer > 0 || hoverTimer > 0) ? 'block' : 'none';
            document.getElementById('powerup-bar').innerText = magnetTimer > 0 ? "🧲 MAGNET" : "🚀 HOVER";

            let targetZ = stumbled ? 4 : 22;
            cop.position.z = THREE.MathUtils.lerp(cop.position.z, targetZ, 0.04);
            cop.position.x = player.position.x;
            cSiren.material.color.setHex(d % 500 < 250 ? 0xff0000 : 0x0000ff);

            trains.forEach(t => {
                t.position.z += speed;
                if(t.position.z > 20) { t.position.z = -200 - Math.random()*100; t.position.x = LANES[Math.floor(Math.random()*3)]; }
                if(Math.abs(t.position.z - player.position.z) < 6 && Math.abs(t.position.x - player.position.x) < 1.6 && player.position.y < 3) endGame();
            });

            coinsArr.forEach(c => {
                c.position.z += speed; c.rotation.y += 0.05;
                if(magnetTimer > 0 && c.position.z > -5 && c.position.z < 30) {
                    c.position.x = THREE.MathUtils.lerp(c.position.x, player.position.x, 0.15);
                    c.position.y = THREE.MathUtils.lerp(c.position.y, player.position.y + 1, 0.15);
                }
                if(c.position.z > 20) { c.position.z = -50 - Math.random()*100; c.position.x = LANES[Math.floor(Math.random()*3)]; c.position.y = 1.2; }
                if(Math.abs(c.position.z - player.position.z) < 1.5 && Math.abs(c.position.x - player.position.x) < 1.5 && Math.abs(c.position.y - player.position.y) < 2.5) {
                    coins++; c.position.z = -150; document.getElementById('c-count').innerText = coins;
                }
            });

            powerups.forEach(p => {
                p.position.z += speed; p.position.y = 2 + Math.sin(d * 0.004) * 0.3;
                if(p.position.z > 20) { p.position.z = -400 - Math.random()*300; p.position.x = LANES[Math.floor(Math.random()*3)]; }
                if(Math.abs(p.position.z - player.position.z) < 2 && Math.abs(p.position.x - player.position.x) < 1.5) {
                    if(p.pType === 0) magnetTimer = 10; else { hoverTimer = 10; vVel = 0.5; }
                    p.position.z = -500;
                }
            });

            document.getElementById('s-val').innerText = score;
        }

        function startGame() { active = true; document.getElementById('menu').classList.add('hidden'); document.getElementById('hud').classList.remove('hidden'); }
        function endGame() { active = false; document.getElementById('over').classList.remove('hidden'); document.getElementById('f-score').innerText = score; }
        function animate() { requestAnimationFrame(animate); update(); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
